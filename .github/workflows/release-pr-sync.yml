name: Sync release PR

# Runs against release-please PR branches and pushes a sync commit that
# updates .claude-plugin/marketplace.json plugins[].version from each
# plugin's own .claude-plugin/plugin.json. release-please cannot do this
# itself for sub-packages because its extra-files paths reject `..`,
# so we close the loop here.
#
# Uses RELEASE_PLEASE_TOKEN (PAT) for the push so the resulting commit
# re-triggers the Test workflow on the PR. A push from the default
# GITHUB_TOKEN would not.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync marketplace.json
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          persist-credentials: true

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Install Node dependencies
        run: npm ci

      - name: Sync marketplace.json
        id: sync
        run: |
          npm run sync:marketplace
          if git diff --quiet -- .claude-plugin/marketplace.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push sync
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name 'onlooker-bot'
          git config user.email 'community@onlooker.dev'
          git add .claude-plugin/marketplace.json
          git commit -m "chore(release): sync marketplace.json plugin versions"
          git push
